# Repoyu GitHub'a push edince: oyunu derler ve GitHub Pages'e yayınlar.
# Sonuç: https://<kullanıcı>.github.io/<repo>/            -> oynanabilir web sürümü
#        https://<kullanıcı>.github.io/<repo>/privacy.html -> gizlilik politikası URL'si
#
# Tek seferlik ayar: GitHub repo > Settings > Pages > Source = "GitHub Actions".

name: Deploy Lumio (web + privacy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: |
          npm ci
          npm run build
          cp store/privacy.html dist/privacy.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
