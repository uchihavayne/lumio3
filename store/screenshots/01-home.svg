<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796" font-family="'Trebuchet MS',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26306a"/><stop offset="0.6" stop-color="#0b1026"/><stop offset="1" stop-color="#070a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe6a8"/><stop offset="1" stop-color="#f4a52a"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141a3a"/><stop offset="1" stop-color="#0a0e22"/></linearGradient>
  </defs>
  <rect width="1290" height="2796" fill="url(#bg)"/>
  <!-- starlar -->
  <g fill="#dce6ff"><circle cx="160" cy="300" r="4" opacity=".7"/><circle cx="1080" cy="240" r="5" opacity=".6"/><circle cx="1150" cy="560" r="3" opacity=".6"/><circle cx="220" cy="620" r="3" opacity=".5"/></g>
  <!-- başlık -->
  <text x="645" y="250" text-anchor="middle" fill="#fff" font-size="96" font-weight="800">Endless word puzzles</text>
  <text x="645" y="345" text-anchor="middle" fill="#ffcf6b" font-size="52" font-weight="600">Connect letters · learn words · relax</text>

  <!-- telefon çerçevesi -->
  <g>
    <rect x="235" y="470" width="820" height="2200" rx="90" fill="#05070f" stroke="#2a3566" stroke-width="10"/>
    <rect x="255" y="490" width="780" height="2160" rx="74" fill="url(#scr)"/>
    <!-- ekran içeriği -->
    <g transform="translate(645,560)" text-anchor="middle">
      <!-- fener -->
      <rect x="-52" y="0" width="104" height="150" rx="26" fill="url(#gold)"/>
      <rect x="-34" y="18" width="68" height="120" rx="18" fill="#fff3cf"/>
      <circle cx="0" cy="70" r="14" fill="#fffef2"/>
      <text x="0" y="250" fill="#fff" font-size="92" font-weight="900" letter-spacing="2">Lum<tspan fill="#f4a52a">io</tspan></text>
      <text x="0" y="308" fill="#9aa3c7" font-size="40">A word adventure</text>
    </g>
    <!-- Play -->
    <rect x="320" y="950" width="650" height="130" rx="34" fill="url(#gold)"/>
    <text x="645" y="1035" text-anchor="middle" fill="#2a1500" font-size="52" font-weight="900">▶ Play · Level 1</text>
    <!-- daily -->
    <rect x="320" y="1110" width="650" height="110" rx="28" fill="rgba(255,207,107,0.14)" stroke="rgba(255,207,107,.5)" stroke-width="3"/>
    <text x="360" y="1178" fill="#fff" font-size="44" font-weight="800">🗓️ Daily Puzzle</text>
    <text x="930" y="1178" text-anchor="end" fill="#ffcf6b" font-size="44" font-weight="800">▶</text>
    <!-- hub 2x2 -->
    <g font-size="34" font-weight="700" fill="#eef1ff" text-anchor="middle">
      <rect x="320" y="1260" width="312" height="150" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
      <text x="476" y="1330" font-size="52">🏆</text><text x="476" y="1380">Leaderboard</text>
      <rect x="658" y="1260" width="312" height="150" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
      <text x="814" y="1330" font-size="52">📖</text><text x="814" y="1380">Notebook</text>
      <rect x="320" y="1430" width="312" height="150" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
      <text x="476" y="1500" font-size="52">📊</text><text x="476" y="1550">Stats</text>
      <rect x="658" y="1430" width="312" height="150" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
      <text x="814" y="1500" font-size="52">⚙️</text><text x="814" y="1550">Settings</text>
    </g>
    <!-- word of day -->
    <rect x="320" y="1620" width="650" height="160" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="645" y="1672" text-anchor="middle" fill="#9aa3c7" font-size="32">💡 Word of the day</text>
    <text x="645" y="1720" text-anchor="middle" fill="#ffcf6b" font-size="48" font-weight="900">GARDEN</text>
    <text x="645" y="1762" text-anchor="middle" fill="#9aa3c7" font-size="30">land for growing plants</text>
    <!-- chapter nodes -->
    <g>
      <text x="330" y="1870" fill="#9aa3c7" font-size="34" font-weight="800">🏮 Chapter 1</text>
      <g>
        <rect x="330" y="1900" width="110" height="110" rx="24" fill="rgba(91,227,163,.12)" stroke="rgba(91,227,163,.5)"/>
        <rect x="460" y="1900" width="110" height="110" rx="24" fill="rgba(91,227,163,.12)" stroke="rgba(91,227,163,.5)"/>
        <rect x="590" y="1900" width="110" height="110" rx="24" fill="rgba(255,207,107,.14)" stroke="#ffcf6b" stroke-width="4"/>
        <rect x="720" y="1900" width="110" height="110" rx="24" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.1)"/>
        <rect x="850" y="1900" width="110" height="110" rx="24" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.1)"/>
        <text x="385" y="1972" text-anchor="middle" font-size="46">✓</text>
        <text x="515" y="1972" text-anchor="middle" font-size="46">✓</text>
        <text x="645" y="1972" text-anchor="middle" font-size="46">▶</text>
        <text x="775" y="1972" text-anchor="middle" font-size="46" opacity=".4">🔒</text>
        <text x="905" y="1972" text-anchor="middle" font-size="46" opacity=".4">🔒</text>
      </g>
    </g>
  </g>
</svg>
