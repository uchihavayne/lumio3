<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796" font-family="'Trebuchet MS',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a1d3d"/><stop offset="0.6" stop-color="#140812"/><stop offset="1" stop-color="#0a0410"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe6a8"/><stop offset="1" stop-color="#ff8a5c"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c1230"/><stop offset="1" stop-color="#0d0518"/></linearGradient>
  </defs>
  <rect width="1290" height="2796" fill="url(#bg)"/>
  <text x="645" y="250" text-anchor="middle" fill="#fff" font-size="94" font-weight="800">A fresh puzzle every day</text>
  <text x="645" y="345" text-anchor="middle" fill="#ff9eb5" font-size="52" font-weight="600">Keep your streak · share your result</text>

  <rect x="235" y="470" width="820" height="2200" rx="90" fill="#05070f" stroke="#4a2a4d" stroke-width="10"/>
  <rect x="255" y="490" width="780" height="2160" rx="74" fill="url(#scr)"/>

  <!-- daily win panel -->
  <g transform="translate(645,900)" text-anchor="middle">
    <text x="0" y="0" font-size="150">🗓️</text>
    <text x="0" y="150" fill="#fff" font-size="76" font-weight="900">Daily Puzzle</text>
    <text x="0" y="220" fill="#9aa3c7" font-size="44">Level Complete!</text>
    <!-- stats -->
    <g font-weight="900">
      <text x="-220" y="380" fill="#ffcf6b" font-size="72">11</text><text x="-220" y="430" fill="#9aa3c7" font-size="32" font-weight="600">words</text>
      <text x="0" y="380" fill="#ffcf6b" font-size="72">3</text><text x="0" y="430" fill="#9aa3c7" font-size="32" font-weight="600">bonus</text>
      <text x="220" y="380" fill="#ffcf6b" font-size="72">+3</text><text x="220" y="430" fill="#9aa3c7" font-size="32" font-weight="600">🪲</text>
    </g>
    <!-- share button -->
    <rect x="-300" y="500" width="600" height="128" rx="32" fill="url(#gold)"/>
    <text x="0" y="585" fill="#3a0008" font-size="52" font-weight="900">📤 Share</text>
    <rect x="-300" y="650" width="600" height="120" rx="30" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="0" y="728" fill="#eef1ff" font-size="48" font-weight="800">Close</text>
  </g>

  <!-- seri alevi -->
  <g transform="translate(645,1900)" text-anchor="middle">
    <rect x="-330" y="-70" width="660" height="140" rx="34" fill="rgba(255,138,92,.14)" stroke="rgba(255,138,92,.45)"/>
    <text x="0" y="18" fill="#ff9eb5" font-size="52" font-weight="900">🔥 7-day streak</text>
  </g>
  <!-- 7 gün noktaları -->
  <g transform="translate(645,2130)" text-anchor="middle">
    <g font-size="34" font-weight="800" fill="#3a0008">
      <rect x="-315" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="-275" y="55">1</text>
      <rect x="-215" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="-175" y="55">2</text>
      <rect x="-115" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="-75" y="55">3</text>
      <rect x="-15" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="25" y="55">4</text>
      <rect x="85" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="125" y="55">5</text>
      <rect x="185" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="225" y="55">6</text>
      <rect x="285" y="0" width="80" height="80" rx="20" fill="url(#gold)"/><text x="325" y="55">7</text>
    </g>
  </g>
  <text x="645" y="2400" text-anchor="middle" fill="#9aa3c7" font-size="40">Everyone plays the same daily puzzle</text>
</svg>
