<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796" font-family="'Trebuchet MS',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a4a"/><stop offset="0.6" stop-color="#06101f"/><stop offset="1" stop-color="#030a16"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f1e33"/><stop offset="1" stop-color="#060d18"/></linearGradient>
  </defs>
  <rect width="1290" height="2796" fill="url(#bg)"/>
  <text x="645" y="250" text-anchor="middle" fill="#fff" font-size="100" font-weight="800">Make it yours</text>
  <text x="645" y="345" text-anchor="middle" fill="#7fd6ff" font-size="52" font-weight="600">6 languages · themes · big text · relaxed</text>

  <rect x="235" y="470" width="820" height="2200" rx="90" fill="#05070f" stroke="#123a5a" stroke-width="10"/>
  <rect x="255" y="490" width="780" height="2160" rx="74" fill="url(#scr)"/>

  <text x="645" y="640" text-anchor="middle" fill="#fff" font-size="66" font-weight="900">⚙️ Settings</text>

  <!-- tema noktaları -->
  <g>
    <rect x="320" y="720" width="650" height="150" rx="28" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="360" y="810" fill="#fff" font-size="46" font-weight="700">🎨 Theme</text>
    <g>
      <circle cx="720" cy="795" r="34" fill="#ffcf6b" stroke="#fff" stroke-width="4"/>
      <circle cx="800" cy="795" r="34" fill="#ff8a5c"/>
      <circle cx="880" cy="795" r="34" fill="#b8f06b"/>
      <circle cx="925" cy="795" r="34" fill="#4aa8ff" opacity="0"/>
    </g>
    <circle cx="925" cy="795" r="30" fill="#4aa8ff"/>
  </g>

  <!-- diller -->
  <g font-size="64" text-anchor="middle">
    <text x="645" y="990" font-size="44" fill="#9aa3c7" font-weight="700">🌐 Language</text>
    <text x="390" y="1110">🇬🇧</text><text x="520" y="1110">🇹🇷</text><text x="650" y="1110">🇪🇸</text>
    <text x="780" y="1110">🇩🇪</text><text x="910" y="1110">🇫🇷</text>
    <text x="645" y="1210">🇵🇹</text>
  </g>

  <!-- erişilebilirlik toggles -->
  <g>
    <rect x="320" y="1300" width="650" height="120" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="360" y="1378" fill="#fff" font-size="46" font-weight="700">🔠 Large text</text>
    <text x="930" y="1378" text-anchor="end" fill="#5be3d0" font-size="52" font-weight="900">✓</text>
    <rect x="320" y="1440" width="650" height="120" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="360" y="1518" fill="#fff" font-size="46" font-weight="700">◐ High contrast</text>
    <text x="930" y="1518" text-anchor="end" fill="#5be3d0" font-size="52" font-weight="900">✓</text>
    <rect x="320" y="1580" width="650" height="120" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="360" y="1658" fill="#fff" font-size="46" font-weight="700">🌿 Relaxed mode</text>
    <text x="930" y="1658" text-anchor="end" fill="#5be3d0" font-size="52" font-weight="900">✓</text>
    <rect x="320" y="1720" width="650" height="120" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="360" y="1798" fill="#fff" font-size="46" font-weight="700">💬 Auto meaning</text>
    <text x="930" y="1798" text-anchor="end" fill="#5be3d0" font-size="52" font-weight="900">✓</text>
  </g>

  <!-- rozetler -->
  <g text-anchor="middle">
    <text x="645" y="1970" fill="#fff" font-size="46" font-weight="800">🏅 Achievements</text>
    <g font-size="70">
      <rect x="340" y="2010" width="140" height="150" rx="26" fill="rgba(255,207,107,.1)" stroke="rgba(255,207,107,.5)"/><text x="410" y="2110">🌱</text>
      <rect x="500" y="2010" width="140" height="150" rx="26" fill="rgba(255,207,107,.1)" stroke="rgba(255,207,107,.5)"/><text x="570" y="2110">✨</text>
      <rect x="660" y="2010" width="140" height="150" rx="26" fill="rgba(255,207,107,.1)" stroke="rgba(255,207,107,.5)"/><text x="730" y="2110">🔥</text>
      <rect x="820" y="2010" width="140" height="150" rx="26" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.1)"/><text x="890" y="2110" opacity=".5">🔒</text>
    </g>
  </g>
  <text x="645" y="2360" text-anchor="middle" fill="#9aa3c7" font-size="40">Play offline · no account needed</text>
</svg>
