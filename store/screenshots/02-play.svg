<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796" font-family="'Trebuchet MS',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#26306a"/><stop offset="0.6" stop-color="#0b1026"/><stop offset="1" stop-color="#070a1a"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe6a8"/><stop offset="1" stop-color="#ffcf6b"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141a3a"/><stop offset="1" stop-color="#0a0e22"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe6a8"/><stop offset="1" stop-color="#f4a52a"/></linearGradient>
  </defs>
  <rect width="1290" height="2796" fill="url(#bg)"/>
  <text x="645" y="250" text-anchor="middle" fill="#fff" font-size="96" font-weight="800">Swipe to connect letters</text>
  <text x="645" y="345" text-anchor="middle" fill="#5be3a3" font-size="52" font-weight="600">Fill the crossword · tap a word to learn it</text>

  <rect x="235" y="470" width="820" height="2200" rx="90" fill="#05070f" stroke="#2a3566" stroke-width="10"/>
  <rect x="255" y="490" width="780" height="2160" rx="74" fill="url(#scr)"/>

  <!-- üst bar -->
  <g>
    <rect x="300" y="540" width="90" height="90" rx="24" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="345" y="602" text-anchor="middle" fill="#fff" font-size="60">‹</text>
    <text x="645" y="580" text-anchor="middle" fill="#fff" font-size="42" font-weight="800">🌊 Level 12</text>
    <rect x="470" y="600" width="350" height="16" rx="8" fill="rgba(255,255,255,.1)"/>
    <rect x="470" y="600" width="230" height="16" rx="8" fill="#5be3a3"/>
    <rect x="900" y="540" width="120" height="90" rx="24" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="960" y="602" text-anchor="middle" fill="#ffcf6b" font-size="40" font-weight="800">🪲 9</text>
  </g>

  <!-- crossword (GARDEN yatay + RANGE dikey) -->
  <g>
    <!-- yatay GARDEN -->
    <g font-size="58" font-weight="900" fill="#2a1a00" text-anchor="middle">
      <g>
        <rect x="330" y="760" width="96" height="96" rx="16" fill="url(#gold)"/><text x="378" y="828">G</text>
        <rect x="434" y="760" width="96" height="96" rx="16" fill="url(#gold)"/><text x="482" y="828">A</text>
        <rect x="538" y="760" width="96" height="96" rx="16" fill="url(#gold)"/><text x="586" y="828">R</text>
        <rect x="642" y="760" width="96" height="96" rx="16" fill="url(#gold)"/><text x="690" y="828">D</text>
        <rect x="746" y="760" width="96" height="96" rx="16" fill="url(#gold)"/><text x="794" y="828">E</text>
        <rect x="850" y="760" width="96" height="96" rx="16" fill="url(#gold)"/><text x="898" y="828">N</text>
      </g>
      <!-- dikey RANGE (R paylaşımlı) -->
      <rect x="538" y="864" width="96" height="96" rx="16" fill="url(#gold)"/><text x="586" y="932">A</text>
      <rect x="538" y="968" width="96" height="96" rx="16" fill="url(#gold)"/><text x="586" y="1036">N</text>
      <rect x="538" y="1072" width="96" height="96" rx="16" fill="url(#gold)"/><text x="586" y="1140">G</text>
      <rect x="538" y="1176" width="96" height="96" rx="16" fill="url(#gold)"/><text x="586" y="1244">E</text>
      <!-- boş hücre -->
      <rect x="746" y="864" width="96" height="96" rx="16" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)"/>
      <rect x="746" y="968" width="96" height="96" rx="16" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)"/>
    </g>
  </g>

  <!-- bulunan kelime hapları -->
  <g font-size="34" font-weight="800" text-anchor="middle">
    <rect x="360" y="1320" width="180" height="70" rx="34" fill="rgba(91,227,163,.14)" stroke="rgba(91,227,163,.5)"/><text x="450" y="1366" fill="#5be3a3">GARDEN</text>
    <rect x="560" y="1320" width="150" height="70" rx="34" fill="rgba(91,227,163,.14)" stroke="rgba(91,227,163,.5)"/><text x="635" y="1366" fill="#5be3a3">RANGE</text>
    <rect x="730" y="1320" width="120" height="70" rx="34" fill="rgba(255,207,107,.14)" stroke="rgba(255,207,107,.5)"/><text x="790" y="1366" fill="#ffcf6b">AGE</text>
  </g>

  <!-- preview -->
  <rect x="500" y="1440" width="290" height="86" rx="43" fill="rgba(91,227,163,.18)"/>
  <text x="645" y="1500" text-anchor="middle" fill="#5be3a3" font-size="54" font-weight="900" letter-spacing="8">GEAR</text>

  <!-- çark -->
  <g transform="translate(645,2050)">
    <circle r="330" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)" stroke-width="4"/>
    <!-- bağlantı çizgisi G-E-A-R -->
    <polyline points="0,-235 235,0 0,235 -235,0" fill="none" stroke="url(#line)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    <!-- tiles -->
    <g font-size="76" font-weight="900" text-anchor="middle">
      <circle cx="0" cy="-235" r="72" fill="url(#gold)"/><text x="0" y="-210" fill="#2a1500">G</text>
      <circle cx="235" cy="0" r="72" fill="url(#gold)"/><text x="235" y="25" fill="#2a1500">E</text>
      <circle cx="0" cy="235" r="72" fill="url(#gold)"/><text x="0" y="260" fill="#2a1500">A</text>
      <circle cx="-235" cy="0" r="72" fill="url(#gold)"/><text x="-235" y="25" fill="#2a1500">R</text>
      <circle cx="166" cy="-166" r="72" fill="#232c58"/><text x="166" y="-141" fill="#fff">D</text>
      <circle cx="166" cy="166" r="72" fill="#232c58"/><text x="166" y="191" fill="#fff">N</text>
    </g>
  </g>
</svg>
