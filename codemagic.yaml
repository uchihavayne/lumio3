# Codemagic CI — Lumio'yu Mac OLMADAN bulutta derleyip mağazaya gönderir.
#
# Kurulum (tek sefer, codemagic.io):
#  1) GitHub ile giriş yap, bu repoyu (lumio3) Codemagic'e ekle.
#  2) Teams > Personal Account > Integrations > Developer Portal > "App Store Connect
#     API key" ekle ve adını AYNEN  lumio-asc  koy (aşağıdaki integrations bloğu
#     bu ada bakar). Anahtar için gerekli üçlü: Issuer ID + Key ID + .p8 dosyası
#     (App Store Connect > Users and Access > Integrations > Team Keys).
#  3) App Store Connect'te com.lumio.game bundle'ı ile uygulama kaydı oluştur
#     (bundle ID'yi ilk derleme --create ile otomatik kaydettirir; app kaydını
#     ondan SONRA da açabilirsin).
#  4) Start new build > workflow: "Lumio iOS (App Store)" > Start.
#
# Not: iOS derlemesi Codemagic'in macOS makinesinde çalışır; senin Mac'in gerekmez.
# Ücretsiz katman: ayda 500 dk macOS M2 — bu proje ~10-15 dk/derleme.

workflows:
  ios-appstore:
    name: Lumio iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: lumio-asc # Codemagic'te eklediğin API anahtarının adı
    environment:
      vars:
        BUNDLE_ID: "com.lumio.game"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Web build (Vite)
        script: |
          npm ci
          npm run build
      - name: Capacitor iOS ekle & senkronize
        script: |
          npm i @capacitor/core @capacitor/ios
          npx cap add ios || true
          npx cap sync ios
      - name: İkon + açılış ekranı üret (resources/icon.png + splash.png)
        script: |
          npm i -D @capacitor/assets
          npx capacitor-assets generate --ios
      - name: Info.plist — şifreleme beyanı (App Store sorusu otomatik geçilir)
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
      - name: CocoaPods
        script: |
          cd ios/App && pod install
      - name: Otomatik imzalama (App Store Connect API)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Archive & IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # İncelemeye otomatik göndermek istersen (metaveri hazır olunca):
        # submit_to_app_store: true

  android-play:
    name: Lumio Android (Play)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "com.lumio.game"
      node: 20
    scripts:
      - name: Web build
        script: |
          npm ci
          npm run build
      - name: Capacitor Android ekle & senkronize
        script: |
          npm i @capacitor/core @capacitor/android
          npx cap add android || true
          npx cap sync android
      - name: İkon + açılış ekranı üret
        script: |
          npm i -D @capacitor/assets
          npx capacitor-assets generate --android
      - name: Gradle AAB
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
